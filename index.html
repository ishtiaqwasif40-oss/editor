<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Online HTML Editor</title>
    
    <!-- Load Open-Source TinyMCE Framework for the Visual WYSIWYG Editor -->
    <script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js" referrerpolicy="origin"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f5f5f5;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.2rem;
        }
        .clean-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .clean-btn:hover {
            background-color: #c0392b;
        }
        /* Main Workspace: Split-Screen Layout */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 5px;
            padding: 5px;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        .panel-header {
            background-color: #eaeaea;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #444;
            border-bottom: 1px solid #ddd;
        }
        /* Container for the TinyMCE Instance */
        .editor-wrapper {
            flex: 1;
            height: 100%;
        }
        /* Raw Source Code Textarea styling */
        #html-source {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 15px;
            background-color: #282c34;
            color: #abb2bf;
            outline: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Real-Time HTML Editor & Tool</h1>
        <button class="clean-btn" onclick="cleanHTML()">Clean Markup</button>
    </header>

    <div class="workspace">
        <!-- Left Side: Visual WYSIWYG Panel -->
        <div class="panel">
            <div class="panel-header">Visual Editor (WYSIWYG)</div>
            <div class="editor-wrapper">
                <textarea id="visual-editor"><h2>Welcome to your new HTML Editor!</h2><p>Type here or edit the code on the right panel to see real-time synchronization.</p></textarea>
            </div>
        </div>

        <!-- Right Side: Raw Code Syntax Panel -->
        <div class="panel">
            <div class="panel-header">Source HTML Code</div>
            <textarea id="html-source" spellcheck="false" placeholder="Your raw HTML code will output here..."></textarea>
        </div>
    </div>

    <script>
        const sourceTextarea = document.getElementById('html-source');
        let isUpdating = false;

        // Initialize TinyMCE Visual Editor
        tinymce.init({
            selector: '#visual-editor',
            height: '100%',
            resize: false,
            menubar: false,
            plugins: 'lists link image table code visualblocks wordcount',
            toolbar: 'undo redo | blocks | bold italic underline forecolor | alignleft aligncenter alignright alignjustify | bullist numlist | table link image | removeformat',
            branding: false,
            setup: function (editor) {
                // When content changes in the Visual Editor, update the Source Panel
                editor.on('input change keyup NodeChange', function () {
                    if (!isUpdating) {
                        isUpdating = true;
                        sourceTextarea.value = editor.getContent({format: 'html'});
                        isUpdating = false;
                    }
                });

                // Set initial content on load
                editor.on('init', function () {
                    sourceTextarea.value = editor.getContent();
                });
            }
        });

        // When code is edited inside the Source Code panel, sync it back to the Visual panel
        sourceTextarea.addEventListener('input', function () {
            if (!isUpdating) {
                isUpdating = true;
                const newContent = sourceTextarea.value;
                tinymce.get('visual-editor').setContent(newContent);
                isUpdating = false;
            }
        });

        // Utility: Core cleaning function simulating basic markup normalization
        function cleanHTML() {
            let currentContent = sourceTextarea.value;

            // Simple cleaning regex operations:
            currentContent = currentContent.replace(/<!--[\s\S]*?-->/g, ''); // Clear comments
            currentContent = currentContent.replace(/\s*style="[^"]*"/gi, ''); // Remove inline styles
            currentContent = currentContent.replace(/<span[^>]*>([\s\S]*?)<\/span>/gi, '$1'); // Strip empty/useless spans

            // Re-inject clean code into both interfaces
            sourceTextarea.value = currentContent;
            tinymce.get('visual-editor').setContent(currentContent);
        }
    </script>
</body>
</html>
